<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIRAI LABS — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-brand">
      <div class="brand-name"><span style="color:var(--ml-white)">MIRAI</span> <span class="brand-labs">LABS</span></div>
      <div class="brand-tagline">Upsell Tracker</div>
    </div>

    <!-- Step 1: request reset email -->
    <div id="step-request">
      <div class="login-title">Reset your password</div>
      <p style="font-size:12px;color:var(--ml-muted);margin-bottom:18px;">
        Enter your email and we'll send you a reset link.
      </p>
      <form id="request-form">
        <div class="form-group">
          <label for="reset-email">Email address</label>
          <input class="form-input" type="email" id="reset-email" placeholder="you@mirailabs.com" required />
        </div>
        <div id="request-msg" class="form-error" style="margin-bottom:10px;"></div>
        <button type="submit" class="btn-primary" id="request-btn" style="width:100%;justify-content:center;">
          SEND RESET LINK
        </button>
        <div style="text-align:center;margin-top:16px;">
          <a href="/" style="font-size:12px;color:var(--ml-muted);">← Back to login</a>
        </div>
      </form>
    </div>

    <!-- Step 2: set new password (shown when URL has access_token) -->
    <div id="step-update" style="display:none;">
      <div class="login-title">Set new password</div>
      <form id="update-form">
        <div class="form-group">
          <label for="new-password">New password</label>
          <input class="form-input" type="password" id="new-password" placeholder="At least 8 characters" minlength="8" required />
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm password</label>
          <input class="form-input" type="password" id="confirm-password" placeholder="Repeat password" required />
        </div>
        <div id="update-msg" class="form-error" style="margin-bottom:10px;"></div>
        <button type="submit" class="btn-primary" id="update-btn" style="width:100%;justify-content:center;">
          UPDATE PASSWORD
        </button>
      </form>
    </div>

    <!-- Step 3: success -->
    <div id="step-success" style="display:none;text-align:center;">
      <div style="font-size:40px;margin-bottom:14px;color:var(--ml-gold);">✓</div>
      <div class="login-title" id="success-title">Email sent!</div>
      <p id="success-msg" style="font-size:12px;color:var(--ml-muted);margin-bottom:20px;">
        Check your inbox for the reset link.
      </p>
      <a href="/" class="btn-primary" style="justify-content:center;display:inline-flex;">BACK TO LOGIN</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script>
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.slice(1));
    const accessToken = params.get('access_token');
    const type = params.get('type');

    // Handle both invite links (type=invite) and password reset (type=recovery)
    if (accessToken && (type === 'recovery' || type === 'invite' || type === 'signup')) {
      document.getElementById('step-request').style.display = 'none';
      document.getElementById('step-update').style.display = 'block';
      if (type === 'invite' || type === 'signup') {
        document.querySelector('#step-update .login-title').textContent = 'Set your password';
        document.getElementById('update-btn').textContent = 'ACTIVATE ACCOUNT';
      }
      window._supabase.auth.setSession({
        access_token: accessToken,
        refresh_token: params.get('refresh_token') || ''
      });
    }

    document.getElementById('request-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('request-btn');
      const msgEl = document.getElementById('request-msg');
      msgEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Sending…';

      const email = document.getElementById('reset-email').value.trim();
      const { error } = await window._supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/reset-password'
      });

      if (error) {
        msgEl.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'SEND RESET LINK';
      } else {
        document.getElementById('step-request').style.display = 'none';
        document.getElementById('step-success').style.display = 'block';
      }
    });

    document.getElementById('update-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('update-btn');
      const msgEl = document.getElementById('update-msg');
      msgEl.style.color = 'var(--danger)';
      msgEl.textContent = '';

      const newPw = document.getElementById('new-password').value;
      const confirmPw = document.getElementById('confirm-password').value;

      if (newPw !== confirmPw) {
        msgEl.textContent = 'Passwords do not match.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating…';

      const { error } = await window._supabase.auth.updateUser({ password: newPw });
      if (error) {
        msgEl.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'UPDATE PASSWORD';
      } else {
        document.getElementById('step-update').style.display = 'none';
        document.getElementById('step-success').style.display = 'block';
        document.getElementById('success-title').textContent = 'Password updated!';
        document.getElementById('success-msg').textContent = 'You can now sign in with your new password.';
      }
    });
  </script>
</body>
</html>
