<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIRAI LABS — Reset Password</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-brand">
      <div class="brand-name">MIRAI LABS</div>
      <div class="brand-tagline">Upsell Tracker CRM</div>
    </div>

    <!-- Step 1: request reset email -->
    <div id="step-request">
      <div class="login-title">Reset your password</div>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:18px;">
        Enter your email and we'll send you a reset link.
      </p>
      <form id="request-form">
        <div class="form-group">
          <label for="reset-email">Email address</label>
          <input type="email" id="reset-email" placeholder="you@mirailabs.com" required />
        </div>
        <div id="request-msg" class="form-error" style="margin-bottom:10px;"></div>
        <button type="submit" class="btn btn-primary" id="request-btn" style="width:100%;justify-content:center;">
          Send reset link
        </button>
        <div style="text-align:center;margin-top:14px;">
          <a href="/" style="font-size:13px;">← Back to login</a>
        </div>
      </form>
    </div>

    <!-- Step 2: set new password (shown when URL has access_token) -->
    <div id="step-update" style="display:none;">
      <div class="login-title">Set new password</div>
      <form id="update-form">
        <div class="form-group">
          <label for="new-password">New password</label>
          <input type="password" id="new-password" placeholder="At least 8 characters" minlength="8" required />
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm password</label>
          <input type="password" id="confirm-password" placeholder="Repeat password" required />
        </div>
        <div id="update-msg" class="form-error" style="margin-bottom:10px;"></div>
        <button type="submit" class="btn btn-primary" id="update-btn" style="width:100%;justify-content:center;">
          Update password
        </button>
      </form>
    </div>

    <!-- Step 3: success -->
    <div id="step-success" style="display:none;text-align:center;">
      <div style="font-size:48px;margin-bottom:12px;">✅</div>
      <div class="login-title" id="success-title">Email sent!</div>
      <p id="success-msg" style="font-size:13px;color:var(--text-muted);margin-bottom:20px;">
        Check your inbox for the reset link.
      </p>
      <a href="/" class="btn btn-primary" style="justify-content:center;">Back to login</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script>
    // Check if we have an access_token in the URL hash (Supabase redirect)
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.slice(1));
    const accessToken = params.get('access_token');
    const type = params.get('type');

    if (accessToken && type === 'recovery') {
      document.getElementById('step-request').style.display = 'none';
      document.getElementById('step-update').style.display = 'block';

      // Set session from token so updateUser works
      window._supabase.auth.setSession({
        access_token: accessToken,
        refresh_token: params.get('refresh_token') || ''
      });
    }

    // Request form
    document.getElementById('request-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('request-btn');
      const msgEl = document.getElementById('request-msg');
      msgEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Sending…';

      const email = document.getElementById('reset-email').value.trim();
      const { error } = await window._supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/reset-password'
      });

      if (error) {
        msgEl.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Send reset link';
      } else {
        document.getElementById('step-request').style.display = 'none';
        document.getElementById('step-success').style.display = 'block';
      }
    });

    // Update password form
    document.getElementById('update-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('update-btn');
      const msgEl = document.getElementById('update-msg');
      msgEl.style.color = 'var(--danger)';
      msgEl.textContent = '';

      const newPw = document.getElementById('new-password').value;
      const confirmPw = document.getElementById('confirm-password').value;

      if (newPw !== confirmPw) {
        msgEl.textContent = 'Passwords do not match.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating…';

      const { error } = await window._supabase.auth.updateUser({ password: newPw });
      if (error) {
        msgEl.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Update password';
      } else {
        document.getElementById('step-update').style.display = 'none';
        document.getElementById('step-success').style.display = 'block';
        document.getElementById('success-title').textContent = 'Password updated!';
        document.getElementById('success-msg').textContent = 'You can now sign in with your new password.';
      }
    });
  </script>
</body>
</html>
