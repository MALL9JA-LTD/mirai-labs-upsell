<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIRAI LABS — Agents</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <div class="topbar">
    <button id="hamburger">☰</button>
    <span class="brand-name">MIRAI LABS</span>
  </div>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-name">MIRAI LABS</div>
      <div class="brand-sub">Upsell Tracker</div>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user-info">
        <span id="sidebar-user"></span>
        <span id="sidebar-role"></span>
      </div>
      <button id="btn-logout" class="btn btn-secondary btn-sm" style="width:100%;justify-content:center;">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Agents</div>
        <div class="page-subtitle">Manage team members and their roles</div>
      </div>
      <button class="btn btn-primary" id="btn-invite-agent">+ Invite Agent</button>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="agents-body">
            <tr class="loading-row"><td colspan="5"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Invite Agent Modal -->
  <div class="modal-overlay" id="modal-invite">
    <div class="modal modal-sm">
      <div class="modal-header">
        <div class="modal-title">Invite New Agent</div>
        <button class="modal-close" onclick="closeModal('modal-invite')">✕</button>
      </div>
      <div class="modal-body">
        <div class="info-banner" style="margin-bottom:14px;">
          <span class="info-icon">ℹ️</span>
          <div>A Supabase account will be created. The agent will receive a confirmation email if email confirmations are enabled.</div>
        </div>
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="invite-name" placeholder="Jane Doe" />
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="invite-email" placeholder="agent@mirailabs.com" />
        </div>
        <div class="form-group">
          <label>Initial Password *</label>
          <input type="password" id="invite-password" placeholder="Min 8 characters" minlength="8" />
        </div>
        <div class="form-group">
          <label>Role *</label>
          <select id="invite-role">
            <option value="crs_agent">CRS Agent</option>
            <option value="delivery_staff">Delivery Staff</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div id="invite-error" class="form-error"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-invite')">Cancel</button>
        <button class="btn btn-primary" id="invite-btn">Create Account</button>
      </div>
    </div>
  </div>

  <!-- Edit Agent Modal -->
  <div class="modal-overlay" id="modal-edit-agent">
    <div class="modal modal-sm">
      <div class="modal-header">
        <div class="modal-title">Edit Agent</div>
        <button class="modal-close" onclick="closeModal('modal-edit-agent')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-agent-id" />
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="edit-agent-name" />
        </div>
        <div class="form-group">
          <label>Role *</label>
          <select id="edit-agent-role">
            <option value="crs_agent">CRS Agent</option>
            <option value="delivery_staff">Delivery Staff</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div id="edit-error" class="form-error"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-edit-agent')">Cancel</button>
        <button class="btn btn-primary" id="save-agent-btn">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/agents.js"></script>
</body>
</html>
