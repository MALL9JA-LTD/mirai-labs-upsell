<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIRAI LABS — Agents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-brand"><span class="brand-mirai">MIRAI</span> <span class="brand-labs">LABS</span></div>
      <div class="topbar-right">
        <span class="user-role" id="topbar-role"></span>
        <div class="avatar" id="topbar-avatar"></div>
        <button class="btn-ghost btn-sm" id="btn-logout">Sign out</button>
      </div>
    </header>
    <!-- BODY -->
    <div class="app-body">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <nav id="sidebar-nav"></nav>
      </aside>
      <!-- MAIN -->
      <main class="main-content page-enter">

        <div class="page-header">
          <div>
            <div class="page-title">Agents</div>
            <div class="page-subtitle">Manage team members and their roles</div>
          </div>
          <button class="btn-primary" id="btn-invite-agent">+ Invite Agent</button>
        </div>

        <div class="card">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Created</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="agents-body">
                <tr class="loading-row"><td colspan="5"><span class="spinner"></span></td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Invite Agent Modal -->
  <div class="modal-overlay" id="modal-invite">
    <div class="modal modal-sm">
      <div class="modal-header">
        <div class="modal-title">Invite New Agent</div>
        <button class="modal-close" onclick="closeModal('modal-invite')">✕</button>
      </div>
      <div class="modal-body">
        <div class="info-banner" style="margin-bottom:14px;">
          <span class="info-icon">ℹ</span>
          <div>A Supabase account will be created. The agent will receive a confirmation email if email confirmations are enabled.</div>
        </div>
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="invite-name" placeholder="Jane Doe" />
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="invite-email" placeholder="agent@mirailabs.com" />
        </div>
        <div class="form-group">
          <label>Initial Password *</label>
          <input type="password" id="invite-password" placeholder="Min 8 characters" minlength="8" />
        </div>
        <div class="form-group">
          <label>Role *</label>
          <select id="invite-role">
            <option value="crs_agent">CRS Agent</option>
            <option value="delivery_staff">Delivery Staff</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div id="invite-error" class="form-error"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('modal-invite')">Cancel</button>
        <button class="btn-primary" id="invite-btn">Create Account</button>
      </div>
    </div>
  </div>

  <!-- Edit Agent Modal -->
  <div class="modal-overlay" id="modal-edit-agent">
    <div class="modal modal-sm">
      <div class="modal-header">
        <div class="modal-title">Edit Agent</div>
        <button class="modal-close" onclick="closeModal('modal-edit-agent')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-agent-id" />
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="edit-agent-name" />
        </div>
        <div class="form-group">
          <label>Role *</label>
          <select id="edit-agent-role">
            <option value="crs_agent">CRS Agent</option>
            <option value="delivery_staff">Delivery Staff</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div id="edit-error" class="form-error"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('modal-edit-agent')">Cancel</button>
        <button class="btn-primary" id="save-agent-btn">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/agents.js"></script>
</body>
</html>
