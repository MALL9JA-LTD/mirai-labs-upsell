<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIRAI LABS — Deliveries</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <div class="topbar">
    <button id="hamburger">☰</button>
    <span class="brand-name">MIRAI LABS</span>
  </div>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-name">MIRAI LABS</div>
      <div class="brand-sub">Upsell Tracker</div>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user-info">
        <span id="sidebar-user"></span>
        <span id="sidebar-role"></span>
      </div>
      <button id="btn-logout" class="btn btn-secondary btn-sm" style="width:100%;justify-content:center;">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Deliveries</div>
        <div class="page-subtitle">Track and manage all delivery orders</div>
      </div>
    </div>

    <!-- Status Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" data-status="">All</button>
      <button class="tab-btn" data-status="pending">Pending</button>
      <button class="tab-btn" data-status="delivered">Delivered</button>
      <button class="tab-btn" data-status="failed">Failed</button>
      <button class="tab-btn" data-status="returned">Returned</button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search customer or product…" />
      </div>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Customer</th>
              <th>Product</th>
              <th>Qty</th>
              <th>Sale Price</th>
              <th>Delivery Staff</th>
              <th>Status</th>
              <th>Delivery Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="deliveries-body">
            <tr class="loading-row"><td colspan="8"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/deliveries.js"></script>
</body>
</html>
