<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIRAI LABS — Deliveries</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-brand"><span class="brand-mirai">MIRAI</span> <span class="brand-labs">LABS</span></div>
      <div class="topbar-right">
        <span class="user-role" id="topbar-role"></span>
        <div class="avatar" id="topbar-avatar"></div>
        <button class="btn-ghost btn-sm" id="btn-logout">Sign out</button>
      </div>
    </header>
    <!-- BODY -->
    <div class="app-body">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <nav id="sidebar-nav"></nav>
      </aside>
      <!-- MAIN -->
      <main class="main-content page-enter">

        <div class="page-header">
          <div>
            <div class="page-title">Deliveries</div>
            <div class="page-subtitle">Track and manage all delivery orders</div>
          </div>
        </div>

        <!-- Status Tab Pills -->
        <div class="tab-pills">
          <button class="tab-pill active" data-status="">All</button>
          <button class="tab-pill" data-status="pending">Pending</button>
          <button class="tab-pill" data-status="delivered">Delivered</button>
          <button class="tab-pill" data-status="failed">Failed</button>
          <button class="tab-pill" data-status="returned">Returned</button>
        </div>

        <!-- Toolbar -->
        <div class="filter-bar">
          <div class="search-box">
            <input type="text" id="search-input" placeholder="Search customer or product…" />
          </div>
        </div>

        <div class="card">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Customer</th>
                  <th>Product</th>
                  <th>Qty</th>
                  <th>Sale Price</th>
                  <th>Delivery Staff</th>
                  <th>Status</th>
                  <th>Delivery Date</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="deliveries-body">
                <tr class="loading-row"><td colspan="8"><span class="spinner"></span></td></tr>
              </tbody>
            </table>
          </div>
          <div class="pagination" id="pagination"></div>
        </div>

      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/deliveries.js"></script>
</body>
</html>
