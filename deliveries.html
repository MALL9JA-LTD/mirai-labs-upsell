<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIRAI LABS — Deliveries</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-brand"><span class="brand-mirai">MIRAI</span> <span class="brand-labs">LABS</span></div>
      <div class="topbar-right">
        <span class="user-role" id="topbar-role"></span>
        <div class="avatar" id="topbar-avatar"></div>
        <button class="btn-ghost btn-sm" id="btn-logout">Sign out</button>
      </div>
    </header>
    <div class="app-body">
      <aside class="sidebar"><nav id="sidebar-nav"></nav></aside>
      <main class="main-content page-enter">

        <div class="page-header">
          <div>
            <div class="page-title">Deliveries</div>
            <div class="page-subtitle">Track and manage all delivery orders.</div>
          </div>
          <button class="btn-primary" id="btn-new-delivery">+ New Pending Delivery</button>
        </div>

        <!-- 3 Summary stat cards -->
        <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;">
          <div class="stat-card" id="sum-pending-card">
            <div class="stat-label">Pending</div>
            <div class="stat-value" id="sum-pending">—</div>
            <div style="font-size:11px;color:var(--ml-muted);" id="sum-pending-val"></div>
          </div>
          <div class="stat-card" id="sum-delivered-card">
            <div class="stat-label">Delivered</div>
            <div class="stat-value" id="sum-delivered">—</div>
            <div style="font-size:11px;color:var(--ml-muted);" id="sum-delivered-val"></div>
          </div>
          <div class="stat-card" id="sum-failed-card">
            <div class="stat-label">Failed / Returned</div>
            <div class="stat-value" id="sum-failed">—</div>
            <div style="font-size:11px;color:var(--ml-muted);" id="sum-failed-val"></div>
          </div>
        </div>

        <!-- Filter bar -->
        <div class="filter-bar">
          <div class="search-box">
            <input type="text" id="search-input" placeholder="Search customer name or phone…" />
          </div>
          <select id="filter-status" style="padding:8px 10px;background:var(--ml-surface3);border:0.5px solid var(--ml-border);border-radius:var(--radius-sm);color:var(--ml-white);font-size:12px;">
            <option value="pending">Pending only</option>
            <option value="">All</option>
            <option value="delivered">Delivered</option>
            <option value="failed">Failed</option>
            <option value="returned">Returned</option>
          </select>
          <select id="filter-staff" style="padding:8px 10px;background:var(--ml-surface3);border:0.5px solid var(--ml-border);border-radius:var(--radius-sm);color:var(--ml-white);font-size:12px;">
            <option value="">All Delivery Staff</option>
          </select>
          <select id="filter-crs" style="padding:8px 10px;background:var(--ml-surface3);border:0.5px solid var(--ml-border);border-radius:var(--radius-sm);color:var(--ml-white);font-size:12px;">
            <option value="">All CRS</option>
          </select>
        </div>

        <div class="card">
          <div class="table-wrapper">
            <table class="data-table">
              <thead>
                <tr>
                  <th>DATE</th><th>CUSTOMER</th><th>STATE</th><th>ITEMS</th>
                  <th>TOTAL ₦</th><th>STATUS</th><th>DELIVERY STAFF</th><th>LOGGED BY</th><th>ACTIONS</th>
                </tr>
              </thead>
              <tbody id="deliveries-body">
                <tr><td colspan="9" class="empty-state"><em>Loading…</em></td></tr>
              </tbody>
            </table>
          </div>
          <div style="padding:10px 16px;font-size:12px;color:var(--ml-muted);" id="row-count"></div>
          <div class="pagination" id="pagination"></div>
        </div>

      </main>
    </div>
  </div>

  <!-- New / Edit Delivery Modal -->
  <div class="modal-overlay" id="modal-delivery">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div class="modal-title" id="delivery-modal-title">New Pending Delivery</div>
        <button class="modal-close" onclick="closeModal('modal-delivery')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="delivery-id" />
        <div class="form-group">
          <label>Customer *</label>
          <div class="autocomplete-wrapper">
            <input type="text" id="d-cust-search" placeholder="Type name or phone…" autocomplete="off" />
            <div class="autocomplete-list" id="d-cust-list" style="display:none;"></div>
          </div>
          <input type="hidden" id="d-cust-id" />
          <div id="d-cust-info" style="font-size:12px;color:var(--ml-muted);margin-top:4px;"></div>
        </div>
        <div id="d-items-container"></div>
        <button type="button" class="btn-outline btn-sm" id="d-add-item" style="margin-bottom:10px;">+ Add Item</button>
        <div class="running-total" id="d-running-total">Total: ₦0</div>
        <div class="form-row" style="margin-top:12px;">
          <div class="form-group">
            <label>Delivery Staff</label>
            <select id="d-staff"><option value="">— Select staff —</option></select>
          </div>
          <div class="form-group">
            <label>Delivery Fee (₦)</label>
            <input type="number" id="d-delivery-fee" value="0" min="0" />
          </div>
        </div>
        <div class="form-group" id="d-waybill-group" style="display:none;">
          <label>Waybill Fee (₦)</label>
          <input type="number" id="d-waybill-fee" value="0" min="0" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Status</label>
            <select id="d-status">
              <option value="pending">Pending</option>
              <option value="delivered">Delivered</option>
              <option value="failed">Failed</option>
              <option value="returned">Returned</option>
            </select>
          </div>
          <div class="form-group" id="d-crs-group">
            <label>CRS Agent</label>
            <select id="d-crs"><option value="">— Select agent —</option></select>
          </div>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="d-notes" rows="2" placeholder="Optional notes…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('modal-delivery')">Cancel</button>
        <button class="btn-primary" id="save-delivery-btn">Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/deliveries.js"></script>
</body>
</html>
