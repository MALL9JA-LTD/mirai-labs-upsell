<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIRAI LABS — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .otp-inputs {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 20px 0;
    }
    .otp-inputs input {
      width: 48px;
      height: 56px;
      text-align: center;
      font-size: 22px;
      font-family: var(--ff-display);
      font-weight: 300;
      background: var(--ml-surface3);
      border: 0.5px solid var(--ml-border);
      border-radius: 6px;
      color: var(--ml-gold-light);
      outline: none;
      transition: border-color 0.15s ease;
    }
    .otp-inputs input:focus {
      border-color: var(--ml-gold);
      box-shadow: 0 0 0 3px rgba(201,146,42,0.10);
    }
    .otp-inputs input.filled {
      border-color: var(--ml-gold-dim);
    }
    .step { display: none; }
    .step.active { display: block; }
    .resend-link {
      text-align: center;
      margin-top: 12px;
      font-size: 12px;
      color: var(--ml-muted);
    }
    .resend-link button {
      background: none;
      border: none;
      color: var(--ml-gold);
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      font-family: var(--ff-body);
    }
    .resend-link button:disabled {
      color: var(--ml-muted);
      cursor: default;
    }
    .email-highlight {
      color: var(--ml-gold-light);
      font-weight: 500;
    }
    .otp-subtitle {
      font-size: 13px;
      color: var(--ml-muted);
      text-align: center;
      margin-bottom: 8px;
      line-height: 1.6;
    }
  </style>
</head>
<body class="login-page">

  <div class="login-card" style="max-width:420px;">

    <!-- BRAND -->
    <div class="login-brand">
      <div class="brand-name"><span style="color:var(--ml-white)">MIRAI</span> <span class="brand-labs">LABS</span></div>
      <div class="brand-tagline">Upsell Tracker CRM</div>
    </div>

    <!-- STEP 1: REGISTRATION FORM -->
    <div class="step active" id="step-register">
      <div class="login-title">Create your account</div>
      <form id="register-form">
        <div class="form-group">
          <label class="form-label" for="full-name">Full Name</label>
          <input class="form-input" type="text" id="full-name" placeholder="Your full name" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email Address</label>
          <input class="form-input" type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input class="form-input" type="password" id="reg-password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-confirm">Confirm Password</label>
          <input class="form-input" type="password" id="reg-confirm" placeholder="Repeat your password" required autocomplete="new-password" />
        </div>
        <div id="reg-error" class="form-error" style="margin-bottom:10px;"></div>
        <button type="submit" class="btn-primary" id="reg-btn" style="width:100%;justify-content:center;">
          CREATE ACCOUNT
        </button>
      </form>
      <p style="text-align:center;margin-top:20px;font-size:12px;color:var(--ml-muted);">
        Already have an account? <a href="/" style="color:var(--ml-gold);">Sign in</a>
      </p>
    </div>

    <!-- STEP 2: OTP VERIFICATION -->
    <div class="step" id="step-otp">
      <div class="login-title" style="text-align:center;">Verify your email</div>
      <p class="otp-subtitle">
        We sent a 6-digit code to<br>
        <span class="email-highlight" id="otp-email-display"></span>
      </p>
      <form id="otp-form">
        <div class="otp-inputs">
          <input type="text" maxlength="1" inputmode="numeric" class="otp-digit" />
          <input type="text" maxlength="1" inputmode="numeric" class="otp-digit" />
          <input type="text" maxlength="1" inputmode="numeric" class="otp-digit" />
          <input type="text" maxlength="1" inputmode="numeric" class="otp-digit" />
          <input type="text" maxlength="1" inputmode="numeric" class="otp-digit" />
          <input type="text" maxlength="1" inputmode="numeric" class="otp-digit" />
        </div>
        <div id="otp-error" class="form-error" style="margin-bottom:10px;text-align:center;"></div>
        <button type="submit" class="btn-primary" id="otp-btn" style="width:100%;justify-content:center;" disabled>
          VERIFY & SIGN IN
        </button>
      </form>
      <div class="resend-link">
        Didn't receive it? <button id="resend-btn" disabled>Resend code (<span id="resend-timer">60</span>s)</button>
      </div>
      <p style="text-align:center;margin-top:16px;font-size:12px;color:var(--ml-muted);">
        <a href="/register" style="color:var(--ml-muted);">← Use a different email</a>
      </p>
    </div>

    <!-- STEP 3: SUCCESS -->
    <div class="step" id="step-success">
      <div style="text-align:center;padding:20px 0;">
        <div style="font-size:48px;margin-bottom:16px;">✦</div>
        <div class="login-title" style="text-align:center;color:var(--ml-gold-light);">Access Granted</div>
        <p style="font-size:13px;color:var(--ml-muted);margin-top:8px;line-height:1.6;">
          Your account has been verified.<br>Redirecting you now…
        </p>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script>
    let pendingEmail = '';
    let resendCountdown;

    // Redirect if already logged in
    (async () => {
      const { data: { session } } = await window._supabase.auth.getSession();
      if (session) window.location.href = '/dashboard';
    })();

    function showStep(id) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ── STEP 1: Register ──────────────────────────────────────
    document.getElementById('register-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn    = document.getElementById('reg-btn');
      const errEl  = document.getElementById('reg-error');
      const name   = document.getElementById('full-name').value.trim();
      const email  = document.getElementById('reg-email').value.trim().toLowerCase();
      const pass   = document.getElementById('reg-password').value;
      const confirm= document.getElementById('reg-confirm').value;

      errEl.textContent = '';

      if (pass !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        return;
      }
      if (pass.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account…';


      const { data, error } = await window._supabase.auth.signUp({
        email,
        password: pass,
        options: {
          data: { full_name: name, role: 'crs_agent' },
          emailRedirectTo: null
        }
      });

      if (error) {
        errEl.textContent = error.message || 'Unable to create account. Please try again.';
        btn.disabled = false;
        btn.textContent = 'CREATE ACCOUNT';
        return;
      }

      // If email confirmation is disabled, session is returned immediately
      if (data?.session) {
        showStep('step-success');
        setTimeout(() => window.location.href = '/dashboard', 2000);
        return;
      }

      // Otherwise fall back to OTP flow
      pendingEmail = email;
      document.getElementById('otp-email-display').textContent = email;
      showStep('step-otp');
      document.querySelector('.otp-digit').focus();
      startResendTimer();
    });

    // ── OTP INPUT HANDLING ───────────────────────────────────
    const digits = document.querySelectorAll('.otp-digit');
    const otpBtn = document.getElementById('otp-btn');

    digits.forEach((input, i) => {
      input.addEventListener('input', e => {
        // Only allow numbers
        input.value = input.value.replace(/\D/g, '');
        if (input.value) {
          input.classList.add('filled');
          if (i < digits.length - 1) digits[i + 1].focus();
        } else {
          input.classList.remove('filled');
        }
        // Enable button when all 6 filled
        const code = getOtpValue();
        otpBtn.disabled = code.length < 6;
      });

      input.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !input.value && i > 0) {
          digits[i - 1].focus();
          digits[i - 1].value = '';
          digits[i - 1].classList.remove('filled');
        }
        // Allow paste
        if (e.key === 'v' && (e.ctrlKey || e.metaKey)) return;
      });
    });

    // Handle paste on any digit
    digits[0].addEventListener('paste', e => {
      const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
      if (pasted.length === 6) {
        e.preventDefault();
        pasted.split('').forEach((ch, i) => {
          digits[i].value = ch;
          digits[i].classList.add('filled');
        });
        otpBtn.disabled = false;
        digits[5].focus();
      }
    });

    function getOtpValue() {
      return Array.from(digits).map(d => d.value).join('');
    }

    // ── STEP 2: Verify OTP ───────────────────────────────────
    document.getElementById('otp-form').addEventListener('submit', async e => {
      e.preventDefault();
      const errEl = document.getElementById('otp-error');
      errEl.textContent = '';
      otpBtn.disabled = true;
      otpBtn.textContent = 'Verifying…';

      const token = getOtpValue();

      const { error } = await window._supabase.auth.verifyOtp({
        email: pendingEmail,
        token,
        type: 'signup'
      });

      if (error) {
        errEl.textContent = 'Invalid or expired code. Please try again.';
        digits.forEach(d => { d.value = ''; d.classList.remove('filled'); });
        digits[0].focus();
        otpBtn.disabled = true;
        otpBtn.textContent = 'VERIFY & SIGN IN';
        return;
      }

      // Success
      showStep('step-success');
      clearInterval(resendCountdown);
      setTimeout(() => window.location.href = '/dashboard', 2000);
    });

    // ── RESEND TIMER ─────────────────────────────────────────
    function startResendTimer() {
      let seconds = 60;
      const timerEl  = document.getElementById('resend-timer');
      const resendBtn = document.getElementById('resend-btn');
      resendBtn.disabled = true;
      timerEl.textContent = seconds;

      resendCountdown = setInterval(() => {
        seconds--;
        timerEl.textContent = seconds;
        if (seconds <= 0) {
          clearInterval(resendCountdown);
          resendBtn.disabled = false;
          resendBtn.innerHTML = 'Resend code';
        }
      }, 1000);
    }

    document.getElementById('resend-btn').addEventListener('click', async () => {
      const { error } = await window._supabase.auth.resend({
        type: 'signup',
        email: pendingEmail
      });
      if (!error) {
        document.getElementById('otp-error').textContent = '';
        digits.forEach(d => { d.value = ''; d.classList.remove('filled'); });
        digits[0].focus();
        otpBtn.disabled = true;
        startResendTimer();
      }
    });
  </script>
</body>
</html>
