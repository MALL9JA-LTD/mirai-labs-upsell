<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIRAI LABS — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-brand">
      <div class="brand-name"><span style="color:var(--ml-white)">MIRAI</span> <span class="brand-labs">LABS</span></div>
      <div class="brand-tagline">Upsell Tracker</div>
    </div>

    <div class="login-title">Sign in to your account</div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input class="form-input" type="email" id="email" placeholder="you@mirailabs.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <a href="/reset-password" class="forgot-link">Forgot password?</a>
      <div id="login-error" class="form-error" style="margin-bottom:10px;"></div>
      <button type="submit" class="btn-primary" id="login-btn" style="width:100%;justify-content:center;">
        SIGN IN
      </button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:12px;color:var(--ml-muted);">
      Access is by invitation only. Contact your administrator.
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script>
    (async () => {
      const { data: { session } } = await window._supabase.auth.getSession();
      if (session) window.location.href = '/dashboard';
    })();

    // Show message if redirected back due to deactivation
    if (new URLSearchParams(location.search).get('msg') === 'deactivated') {
      document.getElementById('login-error').textContent = 'Your account has been deactivated. Contact your administrator.';
    }

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await window._supabase.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = error.message || 'Invalid credentials. Please try again.';
        btn.disabled = false;
        btn.textContent = 'SIGN IN';
      } else {
        window.location.href = '/dashboard';
      }
    });
  </script>
</body>
</html>
