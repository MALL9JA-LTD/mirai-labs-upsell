<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIRAI LABS — Login</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-brand">
      <div class="brand-name">MIRAI LABS</div>
      <div class="brand-tagline">Upsell Tracker CRM</div>
    </div>

    <div class="login-title">Sign in to your account</div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@mirailabs.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <a href="/reset-password" class="forgot-link">Forgot password?</a>
      <div id="login-error" class="form-error" style="margin-bottom:10px;"></div>
      <button type="submit" class="btn btn-primary" id="login-btn" style="width:100%; justify-content:center;">
        Sign in
      </button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script>
    // If already logged in, redirect
    (async () => {
      const { data: { session } } = await window._supabase.auth.getSession();
      if (session) window.location.href = '/dashboard';
    })();

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await window._supabase.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = error.message || 'Invalid credentials. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      } else {
        window.location.href = '/dashboard';
      }
    });
  </script>
</body>
</html>
