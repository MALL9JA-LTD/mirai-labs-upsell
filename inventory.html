<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIRAI LABS — Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-brand"><span class="brand-mirai">MIRAI</span> <span class="brand-labs">LABS</span></div>
      <div class="topbar-right">
        <span class="user-role" id="topbar-role"></span>
        <div class="avatar" id="topbar-avatar"></div>
        <button class="btn-ghost btn-sm" id="btn-logout">Sign out</button>
      </div>
    </header>
    <div class="app-body">
      <aside class="sidebar"><nav id="sidebar-nav"></nav></aside>
      <main class="main-content page-enter">

        <div class="page-header">
          <div>
            <div class="page-title">Inventory</div>
            <div class="page-subtitle">Manage products and dispatch stock to delivery staff.</div>
          </div>
          <button class="btn-primary" id="btn-add-product">+ Add Product</button>
        </div>

        <!-- Products Section -->
        <div class="section-label">PRODUCTS</div>
        <div id="products-grid" style="margin-bottom:24px;">
          <div class="empty-state"><em>Loading…</em></div>
        </div>

        <!-- Stock by Delivery Staff -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div class="section-label" style="margin:0;flex:1;">STOCK BY DELIVERY STAFF</div>
          <span style="font-size:11px;color:var(--ml-muted);">Sent → Delivered = On Hand</span>
        </div>
        <div class="card" style="margin-bottom:24px;">
          <div class="table-wrapper">
            <table class="data-table" id="stock-table">
              <thead><tr id="stock-thead"><th>STAFF</th></tr></thead>
              <tbody id="stock-body"><tr><td colspan="2" class="empty-state"><em>Loading…</em></td></tr></tbody>
            </table>
          </div>
        </div>

        <!-- Dispatch Stock Form -->
        <div class="section-label">DISPATCH STOCK</div>
        <div class="card" style="margin-bottom:24px;">
          <form id="dispatch-form">
            <div class="form-row">
              <div class="form-group">
                <label>Delivery Staff *</label>
                <select id="dispatch-staff"><option value="">— Select staff —</option></select>
              </div>
              <div class="form-group">
                <label>Product *</label>
                <select id="dispatch-product"><option value="">— Select product —</option></select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Quantity *</label>
                <input type="number" id="dispatch-qty" min="1" value="1" />
              </div>
              <div class="form-group">
                <label>Notes</label>
                <textarea id="dispatch-notes" rows="2" placeholder="Optional notes" style="min-height:40px;"></textarea>
              </div>
            </div>
            <button type="submit" class="btn-primary" id="dispatch-btn">Record Dispatch</button>
          </form>
        </div>

        <!-- Dispatch History -->
        <div class="section-label">DISPATCH HISTORY</div>
        <div class="card">
          <div class="table-wrapper">
            <table class="data-table">
              <thead>
                <tr><th>DATE</th><th>ADMIN</th><th>DELIVERY STAFF</th><th>PRODUCT</th><th>QTY</th><th>NOTES</th><th>ACTIONS</th></tr>
              </thead>
              <tbody id="dispatch-body">
                <tr><td colspan="7" class="empty-state"><em>Loading…</em></td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Add/Edit Product Modal -->
  <div class="modal-overlay" id="modal-product">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="product-modal-title">Add Product</div>
        <button class="modal-close" onclick="closeModal('modal-product')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="product-id" />
        <div class="form-row">
          <div class="form-group">
            <label>Product Name *</label>
            <input type="text" id="p-name" placeholder="e.g. Mirai Slim Pack" />
          </div>
          <div class="form-group">
            <label>SKU</label>
            <input type="text" id="p-sku" placeholder="ML-001" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Single Unit Price (₦)</label>
            <input type="number" id="p-sell" min="0" value="0" />
          </div>
          <div class="form-group">
            <label>Cost per Unit (₦)</label>
            <input type="number" id="p-cost" min="0" value="0" />
          </div>
        </div>
        <div class="form-group" style="max-width:200px;">
          <label>Total Stock</label>
          <input type="number" id="p-stock" min="0" value="0" />
        </div>

        <!-- Pricing Offers -->
        <div style="margin-top:16px;padding-top:14px;border-top:0.5px solid var(--ml-border);">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.15em;color:var(--ml-gold-dim);margin-bottom:12px;">Pricing Offers (optional)</div>

          <div style="display:grid;grid-template-columns:2fr 80px 120px;gap:8px;align-items:end;margin-bottom:10px;">
            <div class="form-group" style="margin:0;"><label style="font-size:10px;">Offer 2 Label</label><input type="text" id="p-o2-label" placeholder="e.g. Buy 2 Get 1 Free" /></div>
            <div class="form-group" style="margin:0;"><label style="font-size:10px;">Units</label><input type="number" id="p-o2-qty" min="1" value="2" /></div>
            <div class="form-group" style="margin:0;"><label style="font-size:10px;">Total Price (₦)</label><input type="number" id="p-o2-price" min="0" value="0" /></div>
          </div>

          <div style="display:grid;grid-template-columns:2fr 80px 120px;gap:8px;align-items:end;margin-bottom:10px;">
            <div class="form-group" style="margin:0;"><label style="font-size:10px;">Offer 3 Label</label><input type="text" id="p-o3-label" placeholder="e.g. Buy 3 Get 2 Free" /></div>
            <div class="form-group" style="margin:0;"><label style="font-size:10px;">Units</label><input type="number" id="p-o3-qty" min="1" value="3" /></div>
            <div class="form-group" style="margin:0;"><label style="font-size:10px;">Total Price (₦)</label><input type="number" id="p-o3-price" min="0" value="0" /></div>
          </div>

          <div style="display:grid;grid-template-columns:2fr 80px 120px;gap:8px;align-items:end;">
            <div class="form-group" style="margin:0;"><label style="font-size:10px;">Offer 4 Label</label><input type="text" id="p-o4-label" placeholder="e.g. Family Pack x5" /></div>
            <div class="form-group" style="margin:0;"><label style="font-size:10px;">Units</label><input type="number" id="p-o4-qty" min="1" value="5" /></div>
            <div class="form-group" style="margin:0;"><label style="font-size:10px;">Total Price (₦)</label><input type="number" id="p-o4-price" min="0" value="0" /></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('modal-product')">Cancel</button>
        <button class="btn-primary" id="save-product-btn">Save Product</button>
      </div>
    </div>
  </div>

  <!-- Edit Dispatch Modal -->
  <div class="modal-overlay" id="modal-dispatch-edit">
    <div class="modal modal-sm">
      <div class="modal-header">
        <div class="modal-title">Edit Dispatch</div>
        <button class="modal-close" onclick="closeModal('modal-dispatch-edit')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-dispatch-id" />
        <div class="form-group">
          <label>Quantity</label>
          <input type="number" id="edit-dispatch-qty" min="1" value="1" />
        </div>
        <div class="form-group">
          <label>Notes</label>
          <input type="text" id="edit-dispatch-notes" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('modal-dispatch-edit')">Cancel</button>
        <button class="btn-primary" id="save-dispatch-btn">Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/inventory.js"></script>
</body>
</html>
