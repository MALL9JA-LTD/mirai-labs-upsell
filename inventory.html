<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIRAI LABS — Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .product-card { background:var(--ml-surface3); border:0.5px solid var(--ml-border); border-radius:var(--radius-lg); padding:20px; margin-bottom:16px; }
    .product-card-name { font-family:var(--ff-display); font-size:22px; font-weight:300; }
    .product-card-sku { font-size:11px; color:var(--ml-muted); }
    .product-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:14px 0; }
    .product-stat label { font-size:9px; text-transform:uppercase; letter-spacing:0.12em; color:var(--ml-gold-dim); display:block; margin-bottom:2px; }
    .product-stat span { font-size:14px; font-weight:500; }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-brand"><span class="brand-mirai">MIRAI</span> <span class="brand-labs">LABS</span></div>
      <div class="topbar-right">
        <span class="user-role" id="topbar-role"></span>
        <div class="avatar" id="topbar-avatar"></div>
        <button class="btn-ghost btn-sm" id="btn-logout">Sign out</button>
      </div>
    </header>
    <div class="app-body">
      <aside class="sidebar"><nav id="sidebar-nav"></nav></aside>
      <main class="main-content page-enter">

        <div class="page-header">
          <div>
            <div class="page-title">Inventory</div>
            <div class="page-subtitle">Manage products and dispatch stock to delivery staff</div>
          </div>
          <button class="btn-primary" id="btn-add-product">+ Add Product</button>
        </div>

        <!-- Products Section -->
        <div class="section-label">PRODUCTS</div>
        <div id="products-grid"><em style="color:var(--ml-muted);">Loading…</em></div>

        <!-- Stock by Delivery Staff -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;margin-top:24px;">
          <div class="section-label" style="margin:0;">STOCK BY DELIVERY STAFF</div>
          <span style="font-size:11px;color:var(--ml-muted);">Sent → Delivered = On Hand</span>
        </div>
        <div class="card" style="margin-bottom:24px;">
          <div class="table-wrapper">
            <table class="data-table" id="stock-table">
              <thead><tr id="stock-thead"><th>STAFF</th></tr></thead>
              <tbody id="stock-body"><tr><td colspan="2" class="empty-state"><em>Loading…</em></td></tr></tbody>
            </table>
          </div>
        </div>

        <!-- Dispatch Form -->
        <div class="section-label">DISPATCH STOCK</div>
        <div class="card" style="margin-bottom:24px;">
          <form id="dispatch-form">
            <div class="form-row">
              <div class="form-group">
                <label>Delivery Staff *</label>
                <select id="dispatch-staff"><option value="">— Select staff —</option></select>
              </div>
              <div class="form-group">
                <label>Product *</label>
                <select id="dispatch-product"><option value="">— Select product —</option></select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Quantity *</label>
                <input type="number" id="dispatch-qty" min="1" value="1" />
              </div>
              <div class="form-group">
                <label>Notes</label>
                <input type="text" id="dispatch-notes" placeholder="Optional notes" />
              </div>
            </div>
            <button type="submit" class="btn-primary" id="dispatch-btn">Record Dispatch</button>
          </form>
        </div>

        <!-- Dispatch History -->
        <div class="section-label">DISPATCH HISTORY</div>
        <div class="card">
          <div class="table-wrapper">
            <table class="data-table">
              <thead><tr><th>DATE</th><th>ADMIN</th><th>DELIVERY STAFF</th><th>PRODUCT</th><th>QTY</th><th>NOTES</th><th>ACTIONS</th></tr></thead>
              <tbody id="dispatch-body"><tr><td colspan="7" class="empty-state"><em>Loading…</em></td></tr></tbody>
            </table>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Add/Edit Product Modal -->
  <div class="modal-overlay" id="modal-product">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="product-modal-title">Add Product</div>
        <button class="modal-close" onclick="closeModal('modal-product')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="product-id" />
        <div class="form-row">
          <div class="form-group">
            <label>Product Name *</label>
            <input type="text" id="p-name" placeholder="e.g. Mirai Slim Pack" />
          </div>
          <div class="form-group">
            <label>SKU</label>
            <input type="text" id="p-sku" placeholder="ML-001" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Selling Price (₦)</label>
            <input type="number" id="p-sell" min="0" value="0" />
          </div>
          <div class="form-group">
            <label>Cost per Unit (₦)</label>
            <input type="number" id="p-cost" min="0" value="0" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Total Stock</label>
            <input type="number" id="p-stock" min="0" value="0" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('modal-product')">Cancel</button>
        <button class="btn-primary" id="save-product-btn">Save Product</button>
      </div>
    </div>
  </div>

  <!-- Edit Dispatch Modal -->
  <div class="modal-overlay" id="modal-dispatch-edit">
    <div class="modal modal-sm">
      <div class="modal-header">
        <div class="modal-title">Edit Dispatch</div>
        <button class="modal-close" onclick="closeModal('modal-dispatch-edit')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-dispatch-id" />
        <div class="form-group">
          <label>Quantity</label>
          <input type="number" id="edit-dispatch-qty" min="1" value="1" />
        </div>
        <div class="form-group">
          <label>Notes</label>
          <input type="text" id="edit-dispatch-notes" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('modal-dispatch-edit')">Cancel</button>
        <button class="btn-primary" id="save-dispatch-btn">Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/inventory.js"></script>
</body>
</html>
