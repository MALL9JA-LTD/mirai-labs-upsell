<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIRAI LABS — Calls</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    #order-section { display: none; }
    .item-remove-btn {
      background: none;
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 7px;
      line-height: 1;
      align-self: flex-end;
      margin-bottom: 0;
    }
    .item-remove-btn:hover { background: var(--danger); color: #fff; }
    .running-total {
      text-align: right;
      font-size: 15px;
      font-weight: 700;
      color: var(--primary);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <div class="topbar">
    <button id="hamburger">☰</button>
    <span class="brand-name">MIRAI LABS</span>
  </div>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-name">MIRAI LABS</div>
      <div class="brand-sub">Upsell Tracker</div>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user-info">
        <span id="sidebar-user"></span>
        <span id="sidebar-role"></span>
      </div>
      <button id="btn-logout" class="btn btn-secondary btn-sm" style="width:100%;justify-content:center;">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Calls &amp; Orders</div>
        <div class="page-subtitle">Log all customer interactions — calls, WhatsApp, and orders</div>
      </div>
      <button class="btn btn-primary" id="btn-log-call">📞 Log New Call</button>
    </div>

    <!-- Filter Bar -->
    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search customer…" />
      </div>
      <select id="filter-outcome" class="btn btn-secondary" style="padding:8px 12px;">
        <option value="">All Outcomes</option>
      </select>
      <select id="filter-agent" class="btn btn-secondary" style="padding:8px 12px;">
        <option value="">All Agents</option>
      </select>
      <input type="date" id="filter-date-from" class="btn btn-secondary" style="padding:8px 12px;" title="From date" />
      <input type="date" id="filter-date-to"   class="btn btn-secondary" style="padding:8px 12px;" title="To date" />
    </div>

    <!-- Calls Table -->
    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Customer</th>
              <th>Phone</th>
              <th>Agent</th>
              <th>Channel</th>
              <th>Outcome</th>
              <th>Notes</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="calls-body">
            <tr class="loading-row"><td colspan="7"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </main>

  <!-- Log Call Modal -->
  <div class="modal-overlay" id="modal-call">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div class="modal-title">Log New Call / Order</div>
        <button class="modal-close" onclick="closeModal('modal-call')">✕</button>
      </div>
      <div class="modal-body">

        <!-- Customer search -->
        <div class="form-group">
          <label>Customer *</label>
          <div class="autocomplete-wrapper">
            <input type="text" id="customer-search" placeholder="Type name or phone…" autocomplete="off" />
            <div class="autocomplete-list" id="customer-list" style="display:none;"></div>
          </div>
          <input type="hidden" id="selected-customer-id" />
          <div id="selected-customer-info" style="margin-top:6px;font-size:12.5px;color:var(--text-muted);"></div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Channel *</label>
            <select id="call-channel">
              <option value="call">📞 Phone Call</option>
              <option value="whatsapp">💬 WhatsApp</option>
            </select>
          </div>
          <div class="form-group">
            <label>Outcome *</label>
            <select id="call-outcome"></select>
          </div>
        </div>

        <div class="form-group">
          <label>Notes</label>
          <textarea id="call-notes" rows="2" placeholder="Any notes about this call…"></textarea>
        </div>

        <!-- Order section — shown when outcome = ordered -->
        <div id="order-section" class="order-section">
          <div class="order-section-title">🛒 Order Details</div>

          <div id="items-container"></div>

          <button type="button" class="btn btn-secondary btn-sm" id="btn-add-item" style="margin-bottom:12px;">
            + Add Item
          </button>

          <div class="running-total" id="running-total">Total: ₦0</div>

          <div class="form-row" style="margin-top:14px;">
            <div class="form-group">
              <label>Delivery Staff</label>
              <select id="delivery-staff"></select>
            </div>
            <div class="form-group">
              <label>Delivery Fee (₦)</label>
              <input type="number" id="delivery-fee" value="0" min="0" />
            </div>
          </div>

          <div class="form-group" id="waybill-group" style="display:none;">
            <label>Waybill Fee (₦)</label>
            <input type="number" id="waybill-fee" value="0" min="0" />
          </div>
        </div>

      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-call')">Cancel</button>
        <button class="btn btn-primary" id="submit-call-btn">Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/calls.js"></script>
</body>
</html>
