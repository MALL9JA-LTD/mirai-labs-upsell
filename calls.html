<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIRAI LABS — Calls</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .calls-split { display:flex; gap:0; flex:1; overflow:hidden; }
    .queue-panel { width:280px; flex-shrink:0; display:flex; flex-direction:column; border-right:0.5px solid var(--ml-border); overflow:hidden; }
    .queue-panel-filters { padding:12px; border-bottom:0.5px solid var(--ml-border); }
    .queue-panel-filters input, .queue-panel-filters select { width:100%; margin-bottom:6px; padding:6px 10px; background:var(--ml-surface3); border:0.5px solid var(--ml-border); border-radius:var(--radius-sm); color:var(--ml-white); font-size:12px; }
    .queue-panel-filters input:last-child, .queue-panel-filters select:last-child { margin-bottom:0; }
    .queue-list { flex:1; overflow-y:auto; }
    .queue-item { padding:10px 12px; border-bottom:0.5px solid var(--ml-border); cursor:pointer; transition:background 0.1s; }
    .queue-item:hover { background:var(--ml-surface3); }
    .queue-item.selected { background:rgba(201,146,42,0.12); border-left:2px solid var(--ml-gold); }
    .queue-item-name { font-weight:500; font-size:13px; }
    .queue-item-sub { font-size:11px; color:var(--ml-muted); margin-top:2px; }
    .record-panel { flex:1; overflow-y:auto; padding:24px; }
    .record-empty { display:flex; align-items:center; justify-content:center; height:100%; }
    .record-name { font-family:var(--ff-display); font-size:24px; font-weight:300; margin-bottom:4px; }
    .record-phone { font-size:13px; color:var(--ml-muted); margin-bottom:16px; }
    .record-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
    .record-field label { font-size:9px; text-transform:uppercase; letter-spacing:0.12em; color:var(--ml-gold-dim); display:block; margin-bottom:2px; }
    .record-field span { font-size:13px; }
    #order-section { display:none; }
    .call-rate-bar { display:flex; flex-wrap:wrap; gap:6px; padding:10px 0; margin-bottom:12px; }
    .call-rate-pill { padding:3px 10px; background:var(--ml-surface3); border:0.5px solid var(--ml-border); border-radius:var(--radius-pill); font-size:11px; color:var(--ml-muted); }
    .call-rate-pill strong { color:var(--ml-white); }
    .tab-bar { display:flex; gap:0; border-bottom:0.5px solid var(--ml-border); margin-bottom:16px; }
    .tab-btn { padding:8px 18px; font-size:12px; cursor:pointer; border:none; background:none; color:var(--ml-muted); border-bottom:2px solid transparent; }
    .tab-btn.active { color:var(--ml-gold); border-bottom-color:var(--ml-gold); }
    .tab-pane { display:none; }
    .tab-pane.active { display:flex; flex-direction:column; flex:1; overflow:hidden; }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-brand"><span class="brand-mirai">MIRAI</span> <span class="brand-labs">LABS</span></div>
      <div class="topbar-right">
        <span class="user-role" id="topbar-role"></span>
        <div class="avatar" id="topbar-avatar"></div>
        <button class="btn-ghost btn-sm" id="btn-logout">Sign out</button>
      </div>
    </header>
    <div class="app-body" style="flex-direction:column;overflow:hidden;">
      <aside class="sidebar"><nav id="sidebar-nav"></nav></aside>
      <div style="display:flex;flex:1;overflow:hidden;">
        <aside class="sidebar"><nav id="sidebar-nav-placeholder"></nav></aside>
        <main class="main-content page-enter" style="padding:0;display:flex;flex-direction:column;overflow:hidden;">

          <div class="page-header" style="padding:16px 24px 12px;flex-shrink:0;">
            <div>
              <div class="page-title">Calls &amp; Orders</div>
              <div class="page-subtitle">Log customer interactions and orders</div>
            </div>
          </div>

          <!-- Call Rate Bar (admin only) -->
          <div id="call-rate-section" style="display:none;padding:0 24px;flex-shrink:0;">
            <div class="call-rate-bar" id="call-rate-bar"></div>
          </div>

          <!-- Tabs -->
          <div style="padding:0 24px;flex-shrink:0;">
            <div class="tab-bar">
              <button class="tab-btn active" data-tab="queue">Customer Queue</button>
              <button class="tab-btn" data-tab="activity">My Activity</button>
            </div>
          </div>

          <!-- Queue Tab -->
          <div class="tab-pane active" id="tab-queue" style="flex:1;overflow:hidden;">
            <div class="calls-split" style="flex:1;overflow:hidden;">
              <!-- Left Panel -->
              <div class="queue-panel">
                <div class="queue-panel-filters">
                  <input type="text" id="q-search" placeholder="Search name or phone…" />
                  <select id="q-tier">
                    <option value="">All Tiers</option>
                    <option value="A">Tier A</option>
                    <option value="B">Tier B</option>
                    <option value="C">Tier C</option>
                  </select>
                  <select id="q-status">
                    <option value="">All Statuses</option>
                    <option value="not_contacted">Not Contacted</option>
                    <option value="contacted">Contacted</option>
                    <option value="interested">Interested</option>
                    <option value="ordered_pending">Ordered Pending</option>
                    <option value="delivered">Delivered</option>
                  </select>
                  <select id="q-agent" style="display:none;">
                    <option value="">All Agents</option>
                  </select>
                  <div style="font-size:11px;color:var(--ml-muted);margin-top:4px;" id="q-count"></div>
                </div>
                <div class="queue-list" id="queue-list"><em style="padding:12px;display:block;color:var(--ml-muted);font-size:12px;">Loading…</em></div>
              </div>
              <!-- Right Panel -->
              <div class="record-panel" id="record-panel">
                <div class="record-empty"><em style="color:var(--ml-muted);">Select a customer to view their record.</em></div>
              </div>
            </div>
          </div>

          <!-- Activity Tab -->
          <div class="tab-pane" id="tab-activity" style="padding:0 24px;overflow-y:auto;">
            <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
              <button class="btn-primary" id="btn-log-call-activity">+ Log New Call</button>
            </div>
            <div class="card">
              <div class="table-wrapper">
                <table class="data-table">
                  <thead><tr><th>DATE</th><th>CUSTOMER</th><th>OUTCOME</th><th>CHANNEL</th><th>NOTES</th><th>ACTIONS</th></tr></thead>
                  <tbody id="activity-body"><tr><td colspan="6" class="empty-state"><em>Loading…</em></td></tr></tbody>
                </table>
              </div>
            </div>
          </div>

        </main>
      </div>
    </div>
  </div>

  <!-- Log Call Modal -->
  <div class="modal-overlay" id="modal-call">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div class="modal-title" id="call-modal-title">Log New Call</div>
        <button class="modal-close" onclick="closeModal('modal-call')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-call-id" />

        <div class="form-group">
          <label>Customer *</label>
          <div class="autocomplete-wrapper">
            <input type="text" id="customer-search" placeholder="Type name or phone…" autocomplete="off" />
            <div class="autocomplete-list" id="customer-list" style="display:none;"></div>
          </div>
          <input type="hidden" id="selected-customer-id" />
          <div id="selected-customer-info" style="margin-top:6px;font-size:12px;color:var(--ml-muted);"></div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Channel *</label>
            <div style="display:flex;gap:6px;">
              <button type="button" class="btn-primary btn-sm" id="ch-call" onclick="setChannel('call')">Call</button>
              <button type="button" class="btn-outline btn-sm" id="ch-whatsapp" onclick="setChannel('whatsapp')">WhatsApp</button>
            </div>
            <input type="hidden" id="call-channel" value="call" />
          </div>
          <div class="form-group">
            <label>Outcome *</label>
            <select id="call-outcome"></select>
          </div>
        </div>

        <div class="form-group">
          <label>Notes</label>
          <textarea id="call-notes" rows="2" placeholder="Notes about this call…"></textarea>
        </div>

        <div id="order-section">
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ml-gold-dim);margin-bottom:12px;padding-top:8px;border-top:0.5px solid var(--ml-border);">Order Details</div>
          <div id="items-container"></div>
          <button type="button" class="btn-outline btn-sm" id="btn-add-item" style="margin-bottom:12px;">+ Add Item</button>
          <div style="font-size:13px;font-weight:500;margin-bottom:12px;" id="running-total">Total: ₦0</div>
          <div class="form-row">
            <div class="form-group">
              <label>Delivery Staff</label>
              <select id="delivery-staff"><option value="">— Select staff —</option></select>
            </div>
            <div class="form-group">
              <label>Delivery Fee (₦)</label>
              <input type="number" id="delivery-fee" value="0" min="0" />
            </div>
          </div>
          <div class="form-group" id="waybill-group" style="display:none;">
            <label>Waybill Fee (₦)</label>
            <input type="number" id="waybill-fee" value="0" min="0" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('modal-call')">Cancel</button>
        <button class="btn-primary" id="submit-call-btn">Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/calls.js"></script>
</body>
</html>
